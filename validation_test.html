<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Test</title>
</head>
<body>
    <form>
        <!-- Trường hợp 1 -->
        <p>Case 1:</p>
        <input type="text" required placeholder="Để trống"><br><br>

        <!-- Trường hợp 2 -->
        <p>Case 2:</p>
        <input type="email" placeholder="Nhập abc"><br><br>

        <!-- Trường hợp 3 -->
        <p>Case 3:</p>
        <input type="number" min="1" max="10" placeholder="Nhập 15"><br><br>

        <!-- Trường hợp 4 -->
        <p>Case 4:</p>
        <input type="text" pattern="[0-9]{10}" placeholder="Nhập abc123"><br><br>

        <!-- Trường hợp 5 -->
        <p>Case 5:</p>
        <input type="password" minlength="8" placeholder="Nhập 123"><br><br>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
