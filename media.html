<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giới thiệu sản phẩm</title>
</head>
<body>

<h1>Trang giới thiệu sản phẩm</h1>

<!-- SVG logo -->
<h2>Logo sản phẩm</h2>
<svg width="100" height="100">
    <circle cx="50" cy="50" r="40" stroke="black" stroke-width="2" fill="blue" />
</svg>

<!-- Ảnh sản phẩm -->
<h2>Sản phẩm</h2>

<figure>
    <img src="https://cdn2.cellphones.com.vn/x/media/catalog/product/i/p/iphone-17-pro-max_3_1_1_1_1_1_1.jpg" alt="Sản phẩm 1 - Điện thoại" loading="lazy" style="width: 300px;; height:auto;">
    <figcaption>iphone 17 pro max</figcaption>
</figure>

<figure>
    <img src="https://cdnv2.tgdd.vn/mwg-static/tgdd/Products/Images/54/329154/airpods-4-cong-usb-c-anc-2-638615780223885505-750x500.jpg" alt="Sản phẩm 2 - Tai nghe" loading="lazy" style="max-width:400px; height:auto;">
    <figcaption>airpod pro 4</figcaption>
</figure>

<figure>
    <img src="https://cdn2.cellphones.com.vn/insecure/rs:fill:0:358/q:90/plain/https://cellphones.com.vn/media/catalog/product/t/e/text_ng_n_1__6_144.png" alt="Sản phẩm 3 - Laptop" loading="lazy" style="max-width: 400px; height:auto;">
    <figcaption>macbook pro m4</figcaption>
</figure>

<!-- Video YouTube -->
<h2>Video giới thiệu (YouTube)</h2>
<iframe width="560" height="315"
    src="https://www.youtube.com/embed/70OZ98oEJ-M?si=0r7ymikg4qhKeXmZ"
    title="Video giới thiệu sản phẩm"
    frameborder="0"
    allowfullscreen>
</iframe>

<!-- Video local -->
<h2>Video sản phẩm</h2>
<video controls poster="poster.jpg" width="560">
    <source src="video.mp4" type="video/mp4">
    <source src="video.webm" type="video/webm">
    Trình duyệt của bạn không hỗ trợ video.
</video>

<!-- Audio -->
<h2>Nhạc nền</h2>
<audio controls>
    <source src="audio.mp3" type="audio/mpeg">
    Trình duyệt của bạn không hỗ trợ audio.
</audio>

</body>
</html>
